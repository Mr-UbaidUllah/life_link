name: blood_donation
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  flutter_screenutil: ^5.9.3
  dotted_border: ^3.1.0
  image_picker: ^1.2.1
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  provider: ^6.1.5+1
  cloud_firestore: ^6.1.1
  shimmer_effect: ^1.0.4
  shimmer: ^3.0.0
  firebase_storage: ^13.0.5
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^19.5.0
  app_settings: ^7.0.0
  intl: ^0.19.0
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  # Generates Android & iOS launcher icons from the single source logo.
  # The Android notification small icon references @mipmap/ic_launcher, so it
  # automatically picks up this same logo once icons are regenerated.
  image_path: "assets/logo/app_logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo/
